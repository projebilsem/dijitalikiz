<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DİJİTAL BAHÇİVAN SOHBET ROBOTU</title>
  <style>
    :root {
      --bg1: #1f5d2d;
      --bg2: #2b6f35;
      --panel: rgba(222, 233, 223, 0.72);
      --panel-2: rgba(214, 230, 216, 0.35);
      --text: #12301a;
      --light: #f5fbf6;
      --border: rgba(255,255,255,0.22);
      --shadow: 0 10px 25px rgba(0,0,0,0.18);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(145deg, var(--bg1), var(--bg2));
      color: var(--light);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }

    .app {
      width: min(460px, 100%);
      height: min(840px, 92vh);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 26px;
      background: linear-gradient(160deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      box-shadow: var(--shadow);
      backdrop-filter: blur(5px);
      overflow: hidden;
      position: relative;
    }

    .header {
      padding: 18px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
    }

    .title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      font-size: 1.1rem;
      letter-spacing: 0.2px;
      font-weight: 800;
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.82);
      line-height: 1.45;
    }

    .chat-wrap {
      height: calc(100% - 150px);
      display: flex;
      flex-direction: column;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .bubble-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 90%;
      align-self: flex-start;
    }

    .bubble {
      max-width: 100%;
      padding: 14px 16px;
      border-radius: 22px;
      line-height: 1.5;
      font-size: 0.96rem;
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .bot {
      align-self: flex-start;
      background: var(--panel);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.35);
      border-top-left-radius: 18px;
    }

    .user {
      align-self: flex-end;
      background: rgba(255,255,255,0.14);
      color: var(--light);
      border: 1px solid rgba(255,255,255,0.15);
      border-bottom-right-radius: 18px;
      max-width: 80%;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-left: 4px;
    }

    .suggestion-btn {
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.14);
      color: var(--light);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .suggestion-btn:hover {
      background: rgba(255,255,255,0.24);
      transform: translateY(-1px);
    }

    .input-bar {
      padding: 14px 16px 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.05));
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-actions {
      padding: 0 16px 16px;
      display: flex;
      justify-content: flex-end;
    }

    .clear-btn {
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.14);
      color: var(--light);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .clear-btn:hover {
      background: rgba(255,255,255,0.24);
      transform: translateY(-1px);
    }

    .input-bar {
      padding: 14px 16px 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.05));
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input {
      flex: 1;
      background: var(--panel-2);
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--light);
      border-radius: 999px;
      padding: 14px 18px;
      font-size: 0.96rem;
      outline: none;
    }

    .input::placeholder {
      color: rgba(255,255,255,0.74);
    }

    .send {
      border: none;
      background: rgba(255,255,255,0.18);
      color: white;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.2s ease;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .send:hover {
      transform: scale(1.04);
      background: rgba(255,255,255,0.28);
    }

    .typing {
      display: inline-flex;
      gap: 5px;
      align-items: center;
    }

    .typing span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #31553b;
      display: inline-block;
      animation: blink 1.2s infinite ease-in-out;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 520px) {
      body { padding: 0; }
      .app {
        width: 100%;
        height: 100vh;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1 class="title">🌿 DİJİTAL BAHÇİVAN SOHBET ROBOTU</h1>
      <p class="subtitle">Okul bahçesindeki bitkiler, sağlık durumları, sensör verileri, CBS ve dijital ikiz hakkında sorular sorabilirsin.</p>
    </div>

    <div class="chat-wrap">
      <div class="messages" id="messages"></div>

      <div class="input-bar">
        <input id="userInput" class="input" type="text" placeholder="Bir soru yaz..." />
        <button id="sendBtn" class="send" aria-label="Gönder">➤</button>
      </div>
      <div class="input-actions">
        <button id="clearBtn" class="clear-btn" type="button">Sohbeti Temizle</button>
      </div>
    </div>
  </div>

  <script>
    const plantData = [
      { id: "AÇ1", tur: "Alev çalısı", grup: "Çalı", yas: 2, alan: "Alan 1", yaprak: "Yeşil-kırmızı", boy: 3.11, saglik: "Orta sağlıklı", sorun: "Yok" },
      { id: "AÇ2", tur: "Alev çalısı", grup: "Çalı", yas: 2, alan: "Alan 1", yaprak: "Yeşil-kırmızı", boy: 2.92, saglik: "Orta sağlıklı", sorun: "Yok" },
      { id: "AÇ3", tur: "Alev çalısı", grup: "Çalı", yas: 2, alan: "Alan 1", yaprak: "Yeşil-kırmızı", boy: 2.83, saglik: "Orta sağlıklı", sorun: "Yok" },
      { id: "ÇI1", tur: "Doğu çınarı", grup: "Ağaç", yas: 3, alan: "Alan 2", yaprak: "Yaprakları dökülmüş", boy: 4.0, saglik: "Kurumuş", sorun: "Kuruma" },
      { id: "ÇI2", tur: "Doğu çınarı", grup: "Ağaç", yas: 3, alan: "Alan 3", yaprak: "Yaprakları dökülmüş", boy: 4.0, saglik: "Kurumuş", sorun: "Kuruma" },
      { id: "FÇ1", tur: "Fıstık çamı", grup: "Ağaç", yas: 1, alan: "Alan 1", yaprak: "Yeşil", boy: 0.8, saglik: "Çok sağlıklı", sorun: "Yok" },
      { id: "FÇ2", tur: "Fıstık çamı", grup: "Ağaç", yas: 1, alan: "Alan 3", yaprak: "Yeşil", boy: 0.65, saglik: "Çok sağlıklı", sorun: "Yok" },
      { id: "ZE1", tur: "Zeytin", grup: "Çalı", yas: 1, alan: "Alan 3", yaprak: "Yeşil", boy: 0.67, saglik: "Çok sağlıklı", sorun: "Yok" },
      { id: "ZE2", tur: "Zeytin", grup: "Çalı", yas: 1, alan: "Alan 2", yaprak: "Yeşil", boy: 0.75, saglik: "Çok sağlıklı", sorun: "Yok" }
    ];

    const sensorInfo = {
      nem: "Toprak nemi için ideal aralık yüzde 20-70'tir.",
      sicaklik: "Toprak sıcaklığı için 8-28 °C iyi kabul edilir. 10-18 °C ise serin ama normal bir aralıktır.",
      ec: "EC yani toprak besin seviyesi 0-0.3 ise çok düşük, 0.3-0.8 ise orta, 0.8-2 arası ise iyi besin düzeyi olarak yorumlanır."
    };

    const concepts = {
      dijitalIkiz: "Dijital ikiz, gerçek bir alanın veya sistemin dijital ortamda oluşturulan güncellenebilir modelidir. Okul bahçesinde dijital ikiz kullanılırsa bitkilerin konumu, sağlık durumu ve sensör verileri tek ekranda izlenebilir.",
      cbs: "CBS yani Coğrafi Bilgi Sistemleri; konuma bağlı verileri harita üzerinde toplamak, analiz etmek ve yorumlamak için kullanılır. Hangi bitkinin nerede olduğu ve hangi alanda kuruma görüldüğü CBS ile gösterilebilir.",
      sensor: "Sensörler toprak nemi, toprak sıcaklığı ve EC gibi verileri ölçerek bitki bakım kararlarını destekler. Böylece sulama, bakım ve risk tespiti daha bilinçli yapılır."
    };

    const areaSummaries = {
      "alan 1": "Alan 1: 3 Alev çalısı, 1 Fıstık çamı.",
      "alan 2": "Alan 2: 1 Doğu çınarı, 1 Zeytin.",
      "alan 3": "Alan 3: 1 Doğu çınarı, 1 Zeytin ve 1 Fıstık çamı."
    };

    const observationGuide = "Bitki gözleminde yaprak rengi, yaprak dökümü, kuruma belirtisi, gövde ve dal yapısı, toprak nemi, güneş alma durumu, zararlı izi, mantar belirtisi, yeni sürgün oluşumu ve genel canlılık birlikte değerlendirilmelidir. Aynı bitki belirli aralıklarla tekrar gözlenirse değişim daha doğru yorumlanır.";

    const careGuide = {
      "alev calisi": "Alev çalısı için yarı gölge veya güneş alan ortam, düzenli fakat aşırı olmayan sulama, iyi drene toprak ve dönemsel budama uygundur.",
      "dogu cinari": "Doğu çınarı için geniş gelişim alanı, derin ve geçirgen toprak, düzenli sulama ve özellikle genç dönemde kuruma belirtilerine karşı yakın takip gerekir.",
      "fistik cami": "Fıstık çamı için bol güneş, çok sık olmayan kontrollü sulama ve suyu tutmayan toprak uygundur. Aşırı sulama kök sorunlarına yol açabilir.",
      "zeytin": "Zeytin için bol güneş, iyi drene toprak ve ölçülü sulama gerekir. Fazla su yerine dengeli bakım daha uygundur."
    };

    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");

    const chatState = {
      lastArea: null,
      lastPlant: null,
      lastTopic: null
    };

    function normalizeText(text) {
      return String(text)
        .toLocaleLowerCase("tr-TR")
        .replace(/[ç]/g, "c")
        .replace(/[ğ]/g, "g")
        .replace(/[ı]/g, "i")
        .replace(/[ö]/g, "o")
        .replace(/[ş]/g, "s")
        .replace(/[ü]/g, "u");
    }

    function addBubble(content, type) {
      const bubble = document.createElement("div");
      bubble.className = "bubble " + type;
      bubble.textContent = content;
      messagesEl.appendChild(bubble);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    function addBotResponse(content, suggestions) {
      const wrap = document.createElement("div");
      wrap.className = "bubble-wrap";

      const bubble = document.createElement("div");
      bubble.className = "bubble bot";
      bubble.textContent = content;
      wrap.appendChild(bubble);

      if (Array.isArray(suggestions) && suggestions.length > 0) {
        const box = document.createElement("div");
        box.className = "suggestions";

        suggestions.forEach(function(item) {
          const btn = document.createElement("button");
          btn.className = "suggestion-btn";
          btn.type = "button";
          btn.textContent = item;
          btn.addEventListener("click", function() {
            handleSend(item);
          });
          box.appendChild(btn);
        });

        wrap.appendChild(box);
      }

      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return wrap;
    }

    function addTyping() {
      const wrap = document.createElement("div");
      wrap.className = "bubble-wrap";

      const bubble = document.createElement("div");
      bubble.className = "bubble bot";
      bubble.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
      wrap.appendChild(bubble);

      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return wrap;
    }

    function uniqueValues(list, key) {
      return Array.from(new Set(list.map(function(item) {
        return item[key];
      })));
    }

    function averageHeightByType(type) {
      const items = plantData.filter(function(p) {
        return normalizeText(p.tur) === normalizeText(type);
      });

      if (!items.length) {
        return null;
      }

      const total = items.reduce(function(sum, p) {
        return sum + Number(p.boy || 0);
      }, 0);

      return (total / items.length).toFixed(2);
    }

    function summaryCounts() {
      const byType = {};
      const byHealth = {};

      plantData.forEach(function(p) {
        byType[p.tur] = (byType[p.tur] || 0) + 1;
        byHealth[p.saglik] = (byHealth[p.saglik] || 0) + 1;
      });

      return { byType: byType, byHealth: byHealth };
    }

    function getPlantsInArea(area) {
      return plantData.filter(function(p) {
        return normalizeText(p.alan) === normalizeText(area);
      });
    }

    function getHealthDetailText(area) {
      const data = area ? getPlantsInArea(area) : plantData;

      if (!data.length) {
        return "Bu alan için sağlık verisi bulunamadı.";
      }

      const total = data.length;
      const cokSaglikli = data.filter(function(p) { return normalizeText(p.saglik).includes("cok saglikli"); }).length;
      const ortaSaglikli = data.filter(function(p) { return normalizeText(p.saglik).includes("orta saglikli"); }).length;
      const kurumus = data.filter(function(p) { return normalizeText(p.saglik).includes("kurumus"); }).length;
      const sorunlu = data.filter(function(p) { return normalizeText(p.sorun) !== "yok"; });

      const baslik = area ? area + " için sağlık özeti:" : "Bitkilerin sağlık durumu ayrıntılı olarak şöyle:";
      const kritikTurler = Array.from(new Set(sorunlu.map(function(p) { return p.tur; })));
      const kritikSatir = kritikTurler.length
        ? "• Öncelikli izlenecek türler: " + kritikTurler.join(", ")
        : "• Öncelikli izlenecek özel bir tür kaydı yok";
      const yorum = kurumus > 0
        ? "Genel tabloya göre sağlıklı bitkiler çoğunlukta olsa da acil dikkat gerektiren kurumuş bireyler bulunuyor."
        : "Genel tabloya göre bitkilerin büyük bölümü sağlıklı görünüyor.";

      return baslik + "\n" +
        "• Toplam kayıt: " + total + "\n" +
        "• Çok sağlıklı: " + cokSaglikli + " adet\n" +
        "• Orta sağlıklı: " + ortaSaglikli + " adet\n" +
        "• Kurumuş: " + kurumus + " adet\n" +
        "• Sorun kaydı olan bitkiler: " + sorunlu.length + " adet\n\n" +
        "Değerlendirme:\n" +
        "• Fıstık çamı ve zeytin kayıtları güçlü durumda görünüyor.\n" +
        "• Alev çalıları orta sağlıklı sınıfında; düzenli gözlem yararlı olur.\n" +
        "• Doğu çınarı kayıtlarında kuruma sorunu var; bakım ve neden analizi öncelikli olmalı.\n" +
        kritikSatir + "\n\n" +
        "Genel yorum: " + yorum;
    }

    function getSuggestions(question) {
      const q = normalizeText(question);

      if (q.includes("saglik")) {
        return [
          "Kurumuş bitkiler hangileri?",
          "Doğu çınarı hakkında bilgi ver",
          "Alan 2'de hangi bitkiler var?"
        ];
      }

      if (q.includes("sensor") || q.includes("nem") || q.includes("sicaklik") || q.includes("ec")) {
        return [
          "Sensörler ne işe yarar?",
          "Dijital ikiz nedir?",
          "CBS ne işe yarar?"
        ];
      }

      if (q.includes("dijital ikiz")) {
        return [
          "CBS ne işe yarar?",
          "Sensör verileri neler?",
          "Okul bahçesinde hangi bitkiler var?"
        ];
      }

      if (q.includes("cbs")) {
        return [
          "Dijital ikiz nedir?",
          "Alan 1'de hangi bitkiler var?",
          "Sağlık durumu kötü olan bitkiler hangileri?"
        ];
      }

      if (q.includes("alan")) {
        return [
          "Bu alandaki bitkilerin sağlık durumu nasıl?",
          "Bitki gözleminde nelere dikkat edilmeli?",
          "Sensör verileri neler?"
        ];
      }

      if (q.includes("gozlem") || q.includes("bakim") || q.includes("bakım")) {
        return [
          "Alev çalısı hakkında bilgi ver",
          "Zeytin hakkında bilgi ver",
          "Sağlık durumları nasıl?"
        ];
      }

      return [
        "Bahçede ne tür bitkiler var?",
        "Sağlık durumları nasıl?",
        "Sensör verileri neler?"
      ];
    }

    function resolveQuestionWithContext(question) {
      let resolved = question.trim();
      const q = normalizeText(resolved);

      const plantHints = ["bakimi", "bakımı", "bakim", "gozlem", "gözlem", "boyu", "durumu", "sagligi", "sağlığı", "nerede"];
      const referencesLastPlant = plantHints.some(function(hint) {
        return q.includes(hint);
      });

      if (referencesLastPlant && chatState.lastPlant && !q.includes(normalizeText(chatState.lastPlant))) {
        resolved += " " + chatState.lastPlant;
      }

      const referencesLastArea = (q.includes("bu alan") || q.includes("o alan") || q.includes("alandaki")) && chatState.lastArea;
      if (referencesLastArea && !q.includes(normalizeText(chatState.lastArea))) {
        resolved += " " + chatState.lastArea;
      }

      return resolved;
    }

    function updateContext(question) {
      const q = normalizeText(question);

      if (q.includes("alan 1")) {
        chatState.lastArea = "Alan 1";
        chatState.lastTopic = "alan";
      } else if (q.includes("alan 2")) {
        chatState.lastArea = "Alan 2";
        chatState.lastTopic = "alan";
      } else if (q.includes("alan 3")) {
        chatState.lastArea = "Alan 3";
        chatState.lastTopic = "alan";
      }

      const matchedPlant = uniqueValues(plantData, "tur").find(function(t) {
        return q.includes(normalizeText(t));
      });

      if (matchedPlant) {
        chatState.lastPlant = matchedPlant;
        chatState.lastTopic = "bitki";
      }
    }

    function answerQuestion(question) {
      const q = normalizeText(question);
      const counts = summaryCounts();

      if (q.includes("hangi bitkiler var") || q.includes("okul bahcesinde") || q.includes("bitkiler neler") || q.includes("ne tur bitkiler var") || q.includes("ne tür bitkiler var") || q.includes("bahcede ne var") || q.includes("bahçede ne var") || q.includes("tur bitkiler")) {
        const typeLines = Object.entries(counts.byType).map(function(entry) {
          return "• " + entry[0] + ": " + entry[1] + " adet";
        }).join("\n");

        return "Okul bahçesinde toplam " + plantData.length + " bitki kaydı var. Türlere göre dağılım şöyle:\n" +
          typeLines +
          "\n\nAlanlara göre dağılım:\n" +
          "• " + areaSummaries["alan 1"] + "\n" +
          "• " + areaSummaries["alan 2"] + "\n" +
          "• " + areaSummaries["alan 3"];
      }

      if (q.includes("saglik durumu kotu") || q.includes("hasta bitki") || q.includes("kurumus") || q.includes("sorunlu bitki")) {
        const risky = plantData.filter(function(p) {
          return normalizeText(p.saglik).includes("kurumus") || normalizeText(p.sorun).includes("kuruma");
        });

        if (!risky.length) {
          return "Kritik durumda görünen bitki kaydı bulunamadı.";
        }

        return "Sağlık durumu en zayıf görünen bitkiler şunlar:\n" + risky.map(function(p) {
          return "• " + p.id + " - " + p.tur + " (" + p.alan + ") | Durum: " + p.saglik + " | Sorun: " + p.sorun;
        }).join("\n");
      }

      if (q.includes("saglik durumlari") || q.includes("saglik durumu") || q.includes("bitkilerin sagligi") || q.includes("bitki sagligi")) {
        const areaMatch = question.match(/Alan\s*[123]/i);
        const area = areaMatch ? areaMatch[0].replace(/\s+/g, " ") : null;
        return getHealthDetailText(area);
      }

      if (q.includes("sensor verileri") || q.includes("sensor") || q.includes("nem") || q.includes("sicaklik") || q.includes("ec")) {
        return "Sensör verileri üç ana başlıkta yorumlanabilir:\n" +
          "• " + sensorInfo.nem + "\n" +
          "• " + sensorInfo.sicaklik + "\n" +
          "• " + sensorInfo.ec;
      }

      if (q.includes("dijital ikiz")) {
        return concepts.dijitalIkiz;
      }

      if (q.includes("cbs") || q.includes("cografi bilgi sistem")) {
        return concepts.cbs;
      }

      if (q.includes("ne ise yarar") && q.includes("sensor")) {
        return concepts.sensor;
      }

      if (q.includes("alan 1") || q.includes("alan 2") || q.includes("alan 3")) {
        const match = question.match(/Alan\s*[123]/i);
        const area = match ? match[0].replace(/\s+/g, " ") : null;

        if (area) {
          const areaKey = normalizeText(area);
          const items = getPlantsInArea(area);

          if (!items.length) {
            return area + " için kayıt bulunamadı.";
          }

          return area + " içinde kayıtlı bitkiler:\n" + items.map(function(p) {
            return "• " + p.id + " - " + p.tur + " | " + p.saglik + " | Boy: " + p.boy + " m";
          }).join("\n") + "\n\nÖzet: " + (areaSummaries[areaKey] || "-");
        }
      }

      const matchedPlant = uniqueValues(plantData, "tur").find(function(t) {
        return q.includes(normalizeText(t));
      });

      if (matchedPlant) {
        const items = plantData.filter(function(p) { return p.tur === matchedPlant; });
        const avg = averageHeightByType(matchedPlant);
        const byArea = Array.from(new Set(items.map(function(i) { return i.alan; }))).join(", ");
        const healths = Array.from(new Set(items.map(function(i) { return i.saglik; }))).join(", ");
        const problemsRaw = Array.from(new Set(items.map(function(i) { return i.sorun; }).filter(function(v) {
          return v && v !== "Yok";
        })));
        const problems = problemsRaw.length ? problemsRaw.join(", ") : "Belirgin sorun kaydı yok";
        const careKey = normalizeText(matchedPlant);
        const careText = careGuide[careKey] || "Bu tür için temel bakımda sulama, ışık, toprak yapısı ve düzenli gözlem birlikte değerlendirilmelidir.";

        return matchedPlant + " hakkında kayıt özeti:\n" +
          "• Adet: " + items.length + "\n" +
          "• Bulunduğu alanlar: " + byArea + "\n" +
          "• Ortalama boy: " + avg + " m\n" +
          "• Sağlık durumu: " + healths + "\n" +
          "• Sorun bilgisi: " + problems + "\n" +
          "• Temel bakım: " + careText;
      }

      if (q.includes("gozlem") || q.includes("gözlem") || q.includes("nelere dikkat")) {
        return "Bitkilerin gözlenmesinde dikkat edilmesi gereken temel noktalar şunlardır:\n" + observationGuide;
      }

      if (q.includes("bakim") || q.includes("bakım") || q.includes("bakimi") || q.includes("bakımı") || q.includes("temel sart") || q.includes("temel şart")) {
        return "Bahçedeki türlerin temel bakım şartları şöyledir:\n" +
          "• Alev çalısı: " + careGuide["alev calisi"] + "\n" +
          "• Doğu çınarı: " + careGuide["dogu cinari"] + "\n" +
          "• Fıstık çamı: " + careGuide["fistik cami"] + "\n" +
          "• Zeytin: " + careGuide["zeytin"];
      }

      if (q.includes("yardim") || q.includes("neler sorabilirim")) {
        return "Şunları sorabilirsin: okul bahçesindeki bitkiler, alanlara göre dağılım, sağlık durumu kötü olanlar, bitki gözleminde nelere dikkat edilmeli, türlerin temel bakım şartları, sensör verileri, dijital ikiz, CBS, alev çalısı, doğu çınarı, fıstık çamı veya zeytin hakkında özet bilgiler.";
      }

      return "Bu soruya yakın bir bilgi bulamadım. Bitki listesi, sağlık durumu, alanlara göre dağılım, sensör verileri, dijital ikiz ve CBS hakkında sorular sorabilirsin.";
    }

    function handleSend(prefill) {
      const text = (prefill || inputEl.value).trim();

      if (!text) {
        return;
      }

      addBubble(text, "user");
      inputEl.value = "";

      const typing = addTyping();
      window.setTimeout(function() {
        typing.remove();
        const resolvedText = resolveQuestionWithContext(text);
        const answer = answerQuestion(resolvedText);
        updateContext(resolvedText);
        const suggestions = getSuggestions(resolvedText);
        addBotResponse(answer, suggestions);
      }, 450);
    }

    function clearChat() {
      messagesEl.innerHTML = "";
      chatState.lastArea = null;
      chatState.lastPlant = null;
      chatState.lastTopic = null;
      addBotResponse(
        "Sohbet temizlendi. Okul bahçesindeki bitkiler, sağlık durumu, sensör verileri, dijital ikiz ve CBS hakkında yeniden soru sorabilirsin.",
        [
          "Bahçede ne tür bitkiler var?",
          "Sağlık durumları nasıl?",
          "Sensör verileri neler?"
        ]
      );
    }

    sendBtn.addEventListener("click", function() {
      handleSend();
    });

    clearBtn.addEventListener("click", function() {
      clearChat();
    });

    inputEl.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        handleSend();
      }
    });

    // Basic runtime tests
    console.assert(normalizeText("Doğu Çınarı") === "dogu cinari", "normalizeText should normalize Turkish characters");
    console.assert(getPlantsInArea("Alan 1").length === 4, "Alan 1 should have 4 plants");
    console.assert(answerQuestion("Alan 2'de hangi bitkiler var?").includes("Alan 2"), "Area answer should mention Alan 2");
    console.assert(answerQuestion("Sağlık durumları nasıl?").includes("Toplam kayıt"), "Health answer should include totals");
    console.assert(Array.isArray(getSuggestions("sensör verileri")) && getSuggestions("sensör verileri").length > 0, "Suggestions should be generated");
    console.assert(answerQuestion("Bahçede ne tür bitkiler var?").includes("Türlere göre dağılım"), "Variant plant question should be recognized");
    chatState.lastPlant = "Zeytin";
    console.assert(resolveQuestionWithContext("Bakımı nasıl?").includes("Zeytin"), "Context should attach last plant to follow-up questions");
    chatState.lastPlant = null;

    addBotResponse(
      "Merhaba! Ben Dijital Bahçıvan. Okul bahçesindeki bitkiler, sağlık durumu, sensör verileri, dijital ikiz ve CBS hakkında sorularını yanıtlayabilirim.",
      [
        "Okul bahçesinde hangi bitkiler var?",
        "Sağlık durumları nasıl?",
        "Sensör verileri neler?"
      ]
    );
  </script>
</body>
</html>
