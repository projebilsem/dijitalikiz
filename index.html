<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DİJİTAL BAHÇİVAN SOHBET ROBOTU</title>
  <style>
    :root {
      --bg1: #1f5d2d;
      --bg2: #2b6f35;
      --panel: rgba(222, 233, 223, 0.72);
      --panel-2: rgba(214, 230, 216, 0.35);
      --text: #12301a;
      --light: #f5fbf6;
      --accent: #dce8dc;
      --accent-2: #cddacd;
      --chip: rgba(255,255,255,0.18);
      --chip-hover: rgba(255,255,255,0.28);
      --border: rgba(255,255,255,0.22);
      --shadow: 0 10px 25px rgba(0,0,0,0.18);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(145deg, var(--bg1), var(--bg2));
      color: var(--light);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }

    .app {
      width: min(460px, 100%);
      height: min(840px, 92vh);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 26px;
      background: linear-gradient(160deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      box-shadow: var(--shadow);
      backdrop-filter: blur(5px);
      overflow: hidden;
      position: relative;
    }

    .header {
      padding: 18px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
    }

    .title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      font-size: 1.1rem;
      letter-spacing: 0.2px;
      font-weight: 800;
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.82);
      line-height: 1.45;
    }

    .chat-wrap {
      height: calc(100% - 150px);
      display: flex;
      flex-direction: column;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .bubble {
      max-width: 90%;
      padding: 14px 16px;
      border-radius: 22px;
      line-height: 1.5;
      font-size: 0.96rem;
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .bot {
      align-self: flex-start;
      background: var(--panel);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.35);
      border-top-left-radius: 18px;
    }

    .user {
      align-self: flex-end;
      background: rgba(255,255,255,0.14);
      color: var(--light);
      border: 1px solid rgba(255,255,255,0.15);
      border-bottom-right-radius: 18px;
    }

    .meta {
      font-size: 0.75rem;
      opacity: 0.72;
      margin-top: 8px;
    }

    .input-bar {
      padding: 14px 16px 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.05));
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input {
      flex: 1;
      background: var(--panel-2);
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--light);
      border-radius: 999px;
      padding: 14px 18px;
      font-size: 0.96rem;
      outline: none;
    }
    .input::placeholder { color: rgba(255,255,255,0.74); }

    .send {
      border: none;
      background: rgba(255,255,255,0.18);
      color: white;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.2s ease;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .send:hover { transform: scale(1.04); background: rgba(255,255,255,0.28); }

    .typing {
      display: inline-flex;
      gap: 5px;
      align-items: center;
    }
    .typing span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #31553b;
      display: inline-block;
      animation: blink 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 520px) {
      body { padding: 0; }
      .app {
        width: 100%;
        height: 100vh;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1 class="title">🌿 DİJİTAL BAHÇİVAN SOHBET ROBOTU</h1>
      <p class="subtitle">Okul bahçesindeki bitkiler, sağlık durumları, sensör verileri, CBS ve dijital ikiz hakkında sorular sorabilirsin.</p>
    </div>

    <div class="chat-wrap">
      <div class="messages" id="messages"></div>

      <div class="input-bar">
        <input id="userInput" class="input" type="text" placeholder="Bir soru yaz..." />
        <button id="sendBtn" class="send" aria-label="Gönder">➤</button>
      </div>
    </div>
  </div>

  <script>
    const plantData = [
      { id: "AÇ1", tur: "Alev çalısı", grup: "Çalı", yas: 2, alan: "Alan 1", yaprak: "Yeşil-kırmızı", boy: 3.11, saglik: "Orta sağlıklı", sorun: "Yok", x: 29.3049505885038, y: 40.927744223342 },
      { id: "AÇ2", tur: "Alev çalısı", grup: "Çalı", yas: 2, alan: "Alan 1", yaprak: "Yeşil-kırmızı", boy: 2.92, saglik: "Orta sağlıklı", sorun: "Yok", x: 29.3049502532277, y: 40.9276846946982 },
      { id: "AÇ3", tur: "Alev çalısı", grup: "Çalı", yas: 2, alan: "Alan 1", yaprak: "Yeşil-kırmızı", boy: 2.83, saglik: "Orta sağlıklı", sorun: "Yok", x: 29.3049536059889, y: 40.9276431512593 },
      { id: "ÇI1", tur: "Doğu çınarı", grup: "Ağaç", yas: 3, alan: "Alan 2", yaprak: "Yaprakları dökülmüş", boy: 4.0, saglik: "Kurumuş", sorun: "Kuruma", x: 29.3048580522927, y: 40.9276757970601 },
      { id: "ÇI2", tur: "Doğu çınarı", grup: "Ağaç", yas: 3, alan: "Alan 3", yaprak: "Yaprakları dökülmüş", boy: 4.0, saglik: "Kurumuş", sorun: "Kuruma", x: 29.3049442182574, y: 40.9270068242287 },
      { id: "FÇ1", tur: "Fıstık çamı", grup: "Ağaç", yas: 1, alan: "Alan 1", yaprak: "Yeşil", boy: 0.8, saglik: "Çok sağlıklı", sorun: "Yok", x: 29.3049492473992, y: 40.9277130658069 },
      { id: "FÇ2", tur: "Fıstık çamı", grup: "Ağaç", yas: 1, alan: "Alan 3", yaprak: "Yeşil", boy: 0.65, saglik: "Çok sağlıklı", sorun: "Yok", x: 29.3049717108997, y: 40.9270179701372 },
      { id: "ZE1", tur: "Zeytin", grup: "Çalı", yas: 1, alan: "Alan 3", yaprak: "Yeşil", boy: 0.67, saglik: "Çok sağlıklı", sorun: "Yok", x: 29.3049100200924, y: 40.9269987181123 },
      { id: "ZE2", tur: "Zeytin", grup: "Çalı", yas: 1, alan: "Alan 2", yaprak: "Yeşil", boy: 0.75, saglik: "Çok sağlıklı", sorun: "Yok", x: 29.3048567111882, y: 40.9277092661053 }
    ];

    const sensorInfo = {
      nem: "Toprak nemi için ideal aralık %20–70'tir.",
      sicaklik: "Toprak sıcaklığı için 8–28 °C iyi kabul edilir. 10–18 °C ise serin ama normal bir aralıktır.",
      ec: "EC yani toprak besin seviyesi 0–0.3 ise çok düşük, 0.3–0.8 ise orta, 0.8–2 arası ise iyi besin düzeyi olarak yorumlanır."
    };

    const concepts = {
      dijitalIkiz: "Dijital ikiz, gerçek bir alanın, nesnenin veya sistemin dijital ortamda oluşturulan canlı ve güncellenebilir modelidir. Okul bahçesinde dijital ikiz kullanılırsa bitkilerin konumu, sağlık durumu ve sensör verileri tek ekranda izlenebilir.",
      cbs: "CBS yani Coğrafi Bilgi Sistemleri; konuma bağlı verileri harita üzerinde toplamak, analiz etmek ve yorumlamak için kullanılır. Okul bahçesinde hangi bitkinin nerede olduğu, hangi alanda kuruma görüldüğü ve sensör noktalarının dağılımı CBS ile gösterilebilir.",
      sensor: "Sensörler toprak nemi, toprak sıcaklığı ve EC gibi verileri ölçerek bitki bakım kararlarını destekler. Böylece sulama, bakım ve risk tespiti daha bilinçli yapılır."
    };

    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");

    function normalizeText(text) {
      return text
        .toLocaleLowerCase("tr-TR")
        .replace(/[ç]/g, "c")
        .replace(/[ğ]/g, "g")
        .replace(/[ı]/g, "i")
        .replace(/[ö]/g, "o")
        .replace(/[ş]/g, "s")
        .replace(/[ü]/g, "u");
    }

    function addBubble(content, type = "bot") {
      const bubble = document.createElement("div");
      bubble.className = `bubble ${type}`;
      bubble.textContent = content;
      messagesEl.appendChild(bubble);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    function addTyping() {
      const bubble = document.createElement("div");
      bubble.className = "bubble bot";
      bubble.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
      messagesEl.appendChild(bubble);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    function uniqueValues(list, key) {
      return [...new Set(list.map(item => item[key]))];
    }

    function averageHeightByType(type) {
      const items = plantData.filter(p => normalizeText(p.tur) === normalizeText(type));
      if (!items.length) return null;
      const avg = items.reduce((sum, p) => sum + Number(p.boy || 0), 0) / items.length;
      return avg.toFixed(2);
    }

    function summaryCounts() {
      const byType = {};
      const byHealth = {};
      plantData.forEach(p => {
        byType[p.tur] = (byType[p.tur] || 0) + 1;
        byHealth[p.saglik] = (byHealth[p.saglik] || 0) + 1;
      });
      return { byType, byHealth };
    }

    function getPlantsInArea(area) {
      return plantData.filter(p => normalizeText(p.alan) === normalizeText(area));
    }

    function answerQuestion(question) {
      const q = normalizeText(question);
      const counts = summaryCounts();

      if (q.includes("hangi bitkiler var") || q.includes("okul bahcesinde") || q.includes("bitkiler neler")) {
        const typeLines = Object.entries(counts.byType).map(([k, v]) => `• ${k}: ${v} adet`).join("\n");
        return `Okul bahçesinde toplam ${plantData.length} bitki kaydı var. Türlere göre dağılım şöyle:\n${typeLines}`;
      }

      if (q.includes("saglik durumu kotu") || q.includes("hasta bitki") || q.includes("kurumus") || q.includes("sorunlu bitki")) {
        const risky = plantData.filter(p => normalizeText(p.saglik).includes("kurumus") || normalizeText(p.sorun).includes("kuruma"));
        if (!risky.length) return "Kritik durumda görünen bitki kaydı bulunamadı.";
        return `Sağlık durumu en zayıf görünen bitkiler şunlar:\n${risky.map(p => `• ${p.id} - ${p.tur} (${p.alan}) | Durum: ${p.saglik} | Sorun: ${p.sorun}`).join("\n")}`;
      }

      if (q.includes("saglik durumu") || q.includes("bitkilerin sagligi")) {
        const healthLines = Object.entries(counts.byHealth).map(([k, v]) => `• ${k}: ${v} adet`).join("\n");
        return `Bitkilerin sağlık durumları şöyle özetlenebilir:\n${healthLines}`;
      }

      if (q.includes("sensor verileri") || q.includes("sensor") || q.includes("nem") || q.includes("sicaklik") || q.includes("ec")) {
        return `Sensör verileri üç ana başlıkta yorumlanabilir:\n• ${sensorInfo.nem}\n• ${sensorInfo.sicaklik}\n• ${sensorInfo.ec}`;
      }

      if (q.includes("dijital ikiz")) {
        return concepts.dijitalIkiz;
      }

      if (q.includes("cbs") || q.includes("cografi bilgi sistem")) {
        return concepts.cbs;
      }

      if (q.includes("ne ise yarar") && q.includes("sensor")) {
        return concepts.sensor;
      }

      if (q.includes("alan 1") || q.includes("alan 2") || q.includes("alan 3")) {
        const match = question.match(/Alan\s*[123]/i);
        const area = match ? match[0].replace(/\s+/g, " ") : null;
        if (area) {
          const items = getPlantsInArea(area);
          if (!items.length) return `${area} için kayıt bulunamadı.`;
          return `${area} içinde kayıtlı bitkiler:\n${items.map(p => `• ${p.id} - ${p.tur} | ${p.saglik} | Boy: ${p.boy} m`).join("\n")}`;
        }
      }

      const matchedPlant = uniqueValues(plantData, "tur").find(t => q.includes(normalizeText(t)));
      if (matchedPlant) {
        const items = plantData.filter(p => p.tur === matchedPlant);
        const avg = averageHeightByType(matchedPlant);
        const byArea = [...new Set(items.map(i => i.alan))].join(", ");
        const healths = [...new Set(items.map(i => i.saglik))].join(", ");
        const problems = [...new Set(items.map(i => i.sorun).filter(Boolean).filter(v => v !== "Yok"))].join(", ") || "Belirgin sorun kaydı yok";
        return `${matchedPlant} hakkında kayıt özeti:\n• Adet: ${items.length}\n• Bulunduğu alanlar: ${byArea}\n• Ortalama boy: ${avg} m\n• Sağlık durumu: ${healths}\n• Sorun bilgisi: ${problems}`;
      }

      if (q.includes("yardim") || q.includes("neler sorabilirim")) {
        return "Şunları sorabilirsin: okul bahçesindeki bitkiler, sağlık durumu kötü olanlar, alanlara göre bitki listesi, sensör verileri, dijital ikiz, CBS, alev çalısı, doğu çınarı, fıstık çamı veya zeytin hakkında özet bilgiler.";
      }

      return "Bu soruya yakın bir bilgi bulamadım. Şunları deneyebilirsin: ‘Okul bahçesinde hangi bitkiler var?’, ‘Sağlık durumu kötü olan bitkiler hangileri?’, ‘Sensör verileri neler?’, ‘Dijital ikiz nedir?’ veya ‘CBS ne işe yarar?’";
    }

    function handleSend(prefill = null) {
      const text = (prefill ?? inputEl.value).trim();
      if (!text) return;
      addBubble(text, "user");
      inputEl.value = "";

      const typing = addTyping();
      setTimeout(() => {
        typing.remove();
        addBubble(answerQuestion(text), "bot");
      }, 450);
    }

    sendBtn.addEventListener("click", () => handleSend());
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleSend();
    });

    addBubble("Merhaba! Ben Dijital Bahçıvan. Okul bahçesindeki bitkiler, sensör verileri, dijital ikiz ve CBS hakkında sorularını yanıtlayabilirim.", "bot");
    
  </script>
</body>
</html>
